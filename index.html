<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Charlie Fish Tracker</title>
  <!-- Normalize.css -->
  <link href="https://cdn.jsdelivr.net/npm/normalize.css@8.0.1/normalize.css" rel="stylesheet">
  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
  <!-- Bootstrap 5 CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <!-- Bootstrap Icons -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
  <link rel="stylesheet" href="css/index.css">
</head>

<body>
  <!-- Navigation Bar -->
  <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
    <div class="container">
      <a class="navbar-brand" href="index.html">
        <i class="bi bi-fish2 me-2"></i>Charlie Fish Tracker
      </a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="navbarNav">
        <ul class="navbar-nav ms-auto">
          <li class="nav-item">
            <span class="nav-link" id="loginState">
              <i class="bi bi-person-circle me-1"></i>Please Login
            </span>
          </li>
          <li class="nav-item">
            <a class="nav-link" href="pages/auth.html" id="loginLogoutLink">
              <i class="bi bi-box-arrow-in-right me-1"></i>Login
            </a>
          </li>
          <li class="nav-item">
            <a class="nav-link" href="pages/admin.html">
              <i class="bi bi-gear me-1"></i>Admin
            </a>
          </li>
        </ul>
      </div>
    </div>
  </nav>

  <!-- Main Content -->
  <div class="container mt-5">
    <div class="row">
      <div class="col-12">
        <div class="text-center mb-5">
          <h1 class="display-4" id="appTitle">🎣 Fish Tracker Hub</h1>
          <p class="lead" id="appTagline">Track your fishing adventures with ease</p>
        </div>
      </div>
    </div>

    <div class="row" id="cardsContainer">
      <!-- Cards will be loaded from JSON and rendered here -->
      <div class="col-12 text-center">
        <div class="spinner-border text-primary" role="status">
          <span class="visually-hidden">Loading...</span>
        </div>
        <p class="mt-2">Loading app data...</p>
      </div>
    </div>
  </div>

  <!-- Footer -->
  <footer class="bg-dark text-white mt-5 py-4">
    <div class="container">
      <div class="row">
        <div class="col-md-4">
          <p class="mb-0">
            <i class="bi bi-github me-1"></i>
            <a href="https://github.com/PatrickG241" target="_blank" class="text-white text-decoration-none">PatrickG241</a>
          </p>
        </div>
        <div class="col-md-4 text-center">
          <p class="mb-0">
            <a href="https://github.com/PatrickG241/dev-project" target="_blank" class="text-white text-decoration-none">
              <i class="bi bi-code-slash me-1"></i>GitHub Repository
            </a>
          </p>
        </div>
        <div class="col-md-4 text-md-end">
          <p class="mb-0">
            <a href="pages/admin.html" class="text-white text-decoration-none">
              <i class="bi bi-gear me-1"></i>Admin Dashboard
            </a>
          </p>
        </div>
      </div>
      <div class="row mt-2">
        <div class="col-12 text-center">
          <p class="mb-0 small">
            <i class="bi bi-link-45deg me-1"></i>
            <span id="gistLinkFooter">No Gist saved</span>
          </p>
        </div>
      </div>
    </div>
  </footer>

  <!-- jQuery -->
  <script src="https://code.jquery.com/jquery-3.7.0.min.js"></script>
  <!-- jQuery UI -->
  <script src="https://code.jquery.com/ui/1.13.2/jquery-ui.min.js"></script>
  <!-- Bootstrap 5 JS -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/index.js"></script>

</body>

</html>
