<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - Charlie Fish Tracker</title>
  <!-- Normalize.css -->
  <link href="https://cdn.jsdelivr.net/npm/normalize.css@8.0.1/normalize.css" rel="stylesheet">
  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
  <!-- Bootstrap 5 CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <!-- Bootstrap Icons -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
</head>
<body class="bg-light">
  
  <!-- Navigation Bar -->
  <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
    <div class="container">
      <a class="navbar-brand" href="../index.html">
        <i class="bi bi-fish2 me-2"></i>Charlie Fish Tracker
      </a>
    </div>
  </nav>

  <!-- Login Form -->
  <div class="container mt-5">
    <div class="row justify-content-center">
      <div class="col-md-6">
        <div class="card shadow">
          <div class="card-body p-5">
            <h2 class="text-center mb-4">
              <i class="bi bi-box-arrow-in-right me-2"></i>Login
            </h2>
            
            <form id="loginForm">
              <div class="mb-3">
                <label for="userBox" class="form-label">Username</label>
                <div class="input-group">
                  <span class="input-group-text">
                    <i class="bi bi-person"></i>
                  </span>
                  <input type="text" class="form-control" id="userBox" placeholder="Enter username" required>
                </div>
              </div>
              
              <div class="mb-3">
                <label for="passBox" class="form-label">Password</label>
                <div class="input-group">
                  <span class="input-group-text">
                    <i class="bi bi-lock"></i>
                  </span>
                  <input type="password" class="form-control" id="passBox" placeholder="Enter password" required>
                </div>
              </div>
              
              <div class="d-grid gap-2 mb-3">
                <button type="submit" id="loginBtn" class="btn btn-primary">
                  <i class="bi bi-box-arrow-in-right me-1"></i>Login
                </button>
              </div>
              
              <div class="d-grid gap-2 mb-3">
                <button type="button" id="demoBtn" class="btn btn-outline-secondary">
                  <i class="bi bi-play-circle me-1"></i>Demo Mode
                </button>
              </div>
              
              <div class="d-grid gap-2 mb-3" id="logoutSection" style="display: none;">
                <button type="button" id="logoutBtn" class="btn btn-danger">
                  <i class="bi bi-box-arrow-right me-1"></i>Logout
                </button>
              </div>
              
              <hr>
              
              <div class="text-center">
                <button type="button" class="btn btn-outline-danger me-2" disabled>
                  <i class="bi bi-google me-1"></i>Google
                </button>
                <button type="button" class="btn btn-outline-dark" disabled>
                  <i class="bi bi-github me-1"></i>GitHub
                </button>
              </div>
              
              <p class="text-center mt-3 text-muted small">
                <i class="bi bi-info-circle me-1"></i>
                Demo: Use any username, password is "cat" (hashed)
              </p>
            </form>
            
            <div id="message" class="alert mt-3" style="display: none;"></div>
          </div>
        </div>
        
        <div class="text-center mt-3">
          <a href="../index.html" class="btn btn-link">
            <i class="bi bi-house me-1"></i>Back to Home
          </a>
        </div>
      </div>
    </div>
  </div>

  <!-- jQuery -->
  <script src="https://code.jquery.com/jquery-3.7.0.min.js"></script>
  <!-- jQuery UI -->
  <script src="https://code.jquery.com/ui/1.13.2/jquery-ui.min.js"></script>
  <!-- Bootstrap 5 JS -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

<script>

// JWT Authentication API base URL
// Update this to your instructor's deployed API endpoint
// Example: 'http://136.116.192.154' or 'http://localhost:3000'
const API_BASE = 'http://localhost:3000';

/**
 * Authenticate with JWT Authentication API
 * POST /api/authn/login with { password: 'cat' }
 */
async function authenticateWithAPI(password) {
  try {
    const response = await fetch(`${API_BASE}/api/authn/login`, {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
      },
      body: JSON.stringify({ password })
    });
    
    if (!response.ok) {
      throw new Error('Authentication failed');
    }
    
    const data = await response.json();
    return data.token;
  } catch (error) {
    console.log('API auth failed, using fallback:', error);
    return null;
  }
}

/**
 * Fallback authentication for demo purposes
 * Checks if password matches the expected demo password "cat"
 */
function fallbackAuth(password) {
  return password === 'cat';
}

/**
 * Check if user is logged in via token presence
 */
function isLoggedIn() {
  return Boolean(sessionStorage.getItem('authToken'));
}

document.getElementById('loginForm').addEventListener('submit', async (e) => {
  e.preventDefault();
  
  const username = document.getElementById('userBox').value;
  const password = document.getElementById('passBox').value;
  const messageDiv = document.getElementById('message');
  
  console.log('Attempting login for:', username);
  
  let isAuthN = false;
  
  // Try API authentication first
  const apiToken = await authenticateWithAPI(password);
  
  if (apiToken) {
    isAuthN = true;
    sessionStorage.setItem('authToken', apiToken);
    console.log('Authenticated via API');
  } else {
    // Fallback to local authentication
    isAuthN = fallbackAuth(password);
    console.log('Authenticated via fallback:', isAuthN);
  }
  
  if (isAuthN) {
    sessionStorage.setItem('sessionAuthN', 'true');
    sessionStorage.setItem('username', username);
    
    messageDiv.className = 'alert alert-success';
    messageDiv.textContent = 'Login successful! Redirecting...';
    messageDiv.style.display = 'block';
    
    setTimeout(() => {
      window.location.assign('../index.html');
    }, 1000);
  } else {
    sessionStorage.setItem('sessionAuthN', 'false');
    
    messageDiv.className = 'alert alert-danger';
    messageDiv.textContent = 'Invalid credentials. Please try again.';
    messageDiv.style.display = 'block';
    
    document.getElementById('passBox').value = '';
  }
});

document.getElementById('demoBtn').addEventListener('click', () => {
  document.getElementById('userBox').value = 'demo_user';
  document.getElementById('passBox').value = 'cat';
});

document.getElementById('logoutBtn').addEventListener('click', () => {
  logout();
});

// Check if already logged in and show logout option
function checkLoginState() {
  if (isLoggedIn()) {
    const username = getUsername();
    document.getElementById('loginForm').style.display = 'none';
    document.getElementById('demoBtn').style.display = 'none';
    document.getElementById('logoutSection').style.display = 'block';
    
    const messageDiv = document.getElementById('message');
    messageDiv.className = 'alert alert-success';
    messageDiv.innerHTML = `<i class="bi bi-check-circle me-1"></i>Already logged in as <strong>${username}</strong>`;
    messageDiv.style.display = 'block';
  }
}

// Run on page load
document.addEventListener('DOMContentLoaded', checkLoginState);

</script>

</body>
</html>
