<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>All Catches - Charlie Fish Tracker</title>
  <!-- Normalize.css -->
  <link href="https://cdn.jsdelivr.net/npm/normalize.css@8.0.1/normalize.css" rel="stylesheet">
  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
  <!-- Bootstrap 5 CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <!-- Bootstrap Icons -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
  <link rel="stylesheet" href="../css/catches.css">
</head>
<body class="bg-light">
  
  <!-- Navigation Bar -->
  <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
    <div class="container">
      <a class="navbar-brand" href="../index.html">
        <i class="bi bi-fish2 me-2"></i>Charlie Fish Tracker
      </a>
      <div class="collapse navbar-collapse">
        <ul class="navbar-nav ms-auto">
          <li class="nav-item">
            <a class="nav-link" href="../index.html">
              <i class="bi bi-house me-1"></i>Home
            </a>
          </li>
          <li class="nav-item">
            <a class="nav-link" href="add-catch.html">
              <i class="bi bi-plus-circle me-1"></i>Add Catch
            </a>
          </li>
        </ul>
      </div>
    </div>
  </nav>

  <!-- Catches List -->
  <div class="container mt-5">
    <div class="row">
      <div class="col-12">
        <h2 class="text-center mb-4">
          <i class="bi bi-journal-text me-2"></i>All Catches
        </h2>
      </div>
    </div>

    <!-- Search and Filter Controls -->
    <div class="row mb-4">
      <div class="col-md-4">
        <div class="input-group">
          <span class="input-group-text">
            <i class="bi bi-search"></i>
          </span>
          <input type="text" class="form-control" id="searchInput" placeholder="Search catches...">
        </div>
      </div>
      <div class="col-md-3">
        <select class="form-select" id="filterType">
          <option value="">All Fish Types</option>
        </select>
      </div>
      <div class="col-md-3">
        <select class="form-select" id="sortBy">
          <option value="date-desc">Date (Newest)</option>
          <option value="date-asc">Date (Oldest)</option>
          <option value="type-asc">Type (A-Z)</option>
          <option value="type-desc">Type (Z-A)</option>
        </select>
      </div>
      <div class="col-md-2">
        <button class="btn btn-outline-warning w-100" id="showFavorites">
          <i class="bi bi-star-fill me-1"></i>Favorites
        </button>
      </div>
    </div>

    <!-- Catches Grid -->
    <div id="fishList" class="row">
      <!-- Fish cards will be rendered here -->
    </div>

    <!-- Empty State -->
    <div id="emptyState" class="text-center py-5" style="display: none;">
      <i class="bi bi-fish display-1 text-muted mb-3"></i>
      <h3 class="text-muted">No catches yet</h3>
      <p class="text-muted">Start tracking your fishing adventures!</p>
      <a href="add-catch.html" class="btn btn-primary">
        <i class="bi bi-plus-lg me-1"></i>Add Your First Catch
      </a>
    </div>
  </div>

  <!-- Footer -->
  <footer class="bg-dark text-white mt-5 py-4">
    <div class="container">
      <div class="row">
        <div class="col-md-6">
          <p class="mb-0">
            <i class="bi bi-github me-1"></i>
            <a href="https://github.com/PatrickG241" target="_blank" class="text-white text-decoration-none">PatrickG241</a>
          </p>
        </div>
        <div class="col-md-6 text-md-end">
          <p class="mb-0">
            <a href="admin.html" class="text-white text-decoration-none">
              <i class="bi bi-gear me-1"></i>Admin Dashboard
            </a>
          </p>
        </div>
      </div>
    </div>
  </footer>

  <!-- jQuery -->
  <script src="https://code.jquery.com/jquery-3.7.0.min.js"></script>
  <!-- jQuery UI -->
  <script src="https://code.jquery.com/ui/1.13.2/jquery-ui.min.js"></script>
  <!-- Bootstrap 5 JS -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script src="../js/auth.js"></script>
  <script src="../js/modals.js"></script>
  <script src="../js/catches.js"></script>

</body>
</html>
