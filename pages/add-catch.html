<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Add a Catch</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="../css/add-catch.css">
</head>
<body>
  <a href="../index.html"><-- go home</a>
  <h1>Add a Catch</h1>
  
  <form id="fishForm">
    <label>Fish type:</label>
    <input type="text" id="fishType" placeholder="e.g., Bass" required>
    <br>
    <label>Length (inches):</label>
    <input type="number" id="fishLength" placeholder="e.g., 12">
    <br>
    <label>Weight:</label>
    <input type="text" id="fishWeight" placeholder="e.g., 2 lbs 8 oz">
    <br>
    <label>Body of water:</label>
    <input type="text" id="fishWater" placeholder="e.g., Lake Michigan">
    <br>
    <label>Temperature (°F):</label>
    <input type="number" id="fishTemp" placeholder="e.g., 72">
    <br>
    <label>Time:</label>
    <input type="time" id="fishTime">
    <br>
    <label>Date:</label>
    <input type="date" id="fishDate" required>
    <br>
    <button type="submit">Add Fish</button>
  </form>

  <p id="message"></p>
  <p id="viewCatchesLink" style="display: none; text-align: center;">
    <a href="catches.html">View All Catches</a>
  </p>

  <script src="../js/add-catch.js"></script>

</body>
</html>
