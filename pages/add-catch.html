<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Add a Catch - Charlie Fish Tracker</title>
  <!-- Normalize.css -->
  <link href="https://cdn.jsdelivr.net/npm/normalize.css@8.0.1/normalize.css" rel="stylesheet">
  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
  <!-- Bootstrap 5 CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <!-- Bootstrap Icons -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
  <link rel="stylesheet" href="../css/add-catch.css">
</head>
<body class="bg-light">
  
  <!-- Navigation Bar -->
  <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
    <div class="container">
      <a class="navbar-brand" href="../index.html">
        <i class="bi bi-fish2 me-2"></i>Charlie Fish Tracker
      </a>
      <div class="collapse navbar-collapse">
        <ul class="navbar-nav ms-auto">
          <li class="nav-item">
            <a class="nav-link" href="../index.html">
              <i class="bi bi-house me-1"></i>Home
            </a>
          </li>
        </ul>
      </div>
    </div>
  </nav>

  <!-- Add Catch Form -->
  <div class="container mt-5">
    <div class="row justify-content-center">
      <div class="col-md-8">
        <div class="card shadow">
          <div class="card-body p-5">
            <h2 class="text-center mb-4">
              <i class="bi bi-plus-circle me-2"></i>Add a Catch
            </h2>
            
            <form id="fishForm">
              <div class="row">
                <div class="col-md-6 mb-3">
                  <label for="fishType" class="form-label">Fish Type *</label>
                  <input type="text" class="form-control" id="fishType" placeholder="e.g., Bass" required>
                </div>
                <div class="col-md-6 mb-3">
                  <label for="fishDate" class="form-label">Date *</label>
                  <input type="date" class="form-control" id="fishDate" required>
                </div>
              </div>
              
              <div class="row">
                <div class="col-md-6 mb-3">
                  <label for="fishLength" class="form-label">Length (inches)</label>
                  <input type="number" class="form-control" id="fishLength" placeholder="e.g., 12" step="0.5">
                </div>
                <div class="col-md-6 mb-3">
                  <label for="fishWeight" class="form-label">Weight</label>
                  <input type="text" class="form-control" id="fishWeight" placeholder="e.g., 2 lbs 8 oz">
                </div>
              </div>
              
              <div class="row">
                <div class="col-md-6 mb-3">
                  <label for="fishWater" class="form-label">Body of Water</label>
                  <input type="text" class="form-control" id="fishWater" placeholder="e.g., Lake Michigan">
                </div>
                <div class="col-md-6 mb-3">
                  <label for="fishTemp" class="form-label">Temperature (°F)</label>
                  <input type="number" class="form-control" id="fishTemp" placeholder="e.g., 72">
                </div>
              </div>
              
              <div class="mb-3">
                <label for="fishTime" class="form-label">Time</label>
                <input type="time" class="form-control" id="fishTime">
              </div>
              
              <div class="d-grid gap-2">
                <button type="submit" class="btn btn-primary btn-lg">
                  <i class="bi bi-plus-lg me-1"></i>Add Fish
                </button>
              </div>
            </form>
            
            <div id="message" class="alert mt-3" style="display: none;"></div>
            
            <div id="viewCatchesLink" class="text-center mt-3" style="display: none;">
              <a href="catches.html" class="btn btn-success">
                <i class="bi bi-eye me-1"></i>View All Catches
              </a>
            </div>
          </div>
        </div>
        
        <div class="text-center mt-3">
          <a href="../index.html" class="btn btn-link">
            <i class="bi bi-house me-1"></i>Back to Home
          </a>
        </div>
      </div>
    </div>
  </div>

  <!-- jQuery -->
  <script src="https://code.jquery.com/jquery-3.7.0.min.js"></script>
  <!-- jQuery UI -->
  <script src="https://code.jquery.com/ui/1.13.2/jquery-ui.min.js"></script>
  <!-- Bootstrap 5 JS -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script src="../js/auth.js"></script>
  <script src="../js/add-catch.js"></script>

</body>
</html>
